global:
  resolve_timeout: 5m

route:
  group_by:
    - alertname
    - severity

  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  receiver: telegram-alerts

receivers:

  - name: telegram-alerts

    telegram_configs:
      - bot_token: 'TELEGRAM_BOT_TOKEN'
        chat_id: 123456789
        parse_mode: 'HTML'

        message: |
          🚨 Alert: {{ .CommonLabels.alertname }}

          Severity: {{ .CommonLabels.severity }}

          Description:
          {{ .CommonAnnotations.description }}

          Instance:
          {{ .CommonLabels.instance }}
