global:
  scrape_interval: 60s
  evaluation_interval: 60s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - host.docker.internal:9093

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:

  - job_name: 'blackbox-http'

    metrics_path: /probe

    params:
      module: [http_2xx]

    static_configs:

      - targets:
          - https://example.com
        labels:
          region: msk

      - targets:
          - https://example.com
        labels:
          region: nsk

      - targets:
          - https://example.com
        labels:
          region: vvo

    relabel_configs:

      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: blackbox:9115

  - job_name: 'node-exporter'

    static_configs:
      - targets:
          - node-exporter:9100

remote_write:
  - url: "http://host.docker.internal:8428/api/v1/write"
