groups:

  - name: website-alerts

    rules:

      - alert: WebsiteDown

        expr: probe_success == 0

        for: 2m

        labels:
          severity: critical
          service: website

        annotations:
          summary: "Website is DOWN"
          description: "External HTTP probe failed for more than 2 minutes"

      - alert: HighLatency

        expr: probe_duration_seconds > 2

        for: 5m

        labels:
          severity: warning
          service: website

        annotations:
          summary: "High website latency"
          description: "Website response time exceeded 2 seconds"

      - alert: SSLExpiringSoon

        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 14

        for: 10m

        labels:
          severity: warning
          service: ssl

        annotations:
          summary: "SSL certificate expires soon"
          description: "SSL certificate will expire in less than 14 days"
